name: Site

on:
  pull_request:
    paths:
      - "index.html"
      - "og-image.png"
      - "scripts/check-site-release-metadata.js"
      - ".github/workflows/site.yml"
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "og-image.png"
      - "scripts/check-site-release-metadata.js"
      - ".github/workflows/site.yml"

jobs:
  release-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: node --version
      - run: node scripts/check-site-release-metadata.js
