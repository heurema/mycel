name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc97ebc # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --locked

      - name: Build
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: |
          if [ "$BUILD_TARGET" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target "$BUILD_TARGET"
          else
            cargo build --release --target "$BUILD_TARGET"
          fi

      - name: Package
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: |
          mkdir -p dist
          cp "target/${BUILD_TARGET}/release/mycel" "dist/mycel-${BUILD_TARGET}"
          cd dist && tar czf "mycel-${BUILD_TARGET}.tar.gz" "mycel-${BUILD_TARGET}"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mycel-${{ matrix.target }}
          path: dist/mycel-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
